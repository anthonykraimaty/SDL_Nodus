name: Build and Deploy

on:
  push:
    branches:
      - main
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to server via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ vars.SERVER_HOST }}
          username: ${{ vars.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script_stop: true
          script: |
            set -e

            cd ${{ vars.DEPLOY_PATH }}

            # Pull latest code
            git pull origin main || git pull origin master

            # Stop existing containers
            docker compose down || true

            # Rebuild and restart all containers (postgres + backend)
            docker compose build --no-cache
            docker compose up -d

            # Wait for services to be healthy
            echo "Waiting for services to start..."
            sleep 10

            # Build frontend (static files served by nginx/caddy)
            cd frontend
            npm ci --legacy-peer-deps
            npm run build
            cd ..

            # Show status
            docker ps

            # Kick off thumbnail backfill in the background (idempotent).
            # Safe to run on every deploy — existing thumbs are skipped via a
            # HEAD check, so this is a no-op once all pictures are covered.
            echo "Starting thumbnail backfill (background)..."
            mkdir -p logs
            docker compose exec -dT backend \
              sh -c "node scripts/backfillThumbnails.js >> /tmp/backfill-thumbnails.log 2>&1" \
              || echo "(backfill kickoff failed — run manually: docker compose exec backend node scripts/backfillThumbnails.js)"

            echo "Deployment completed successfully!"
